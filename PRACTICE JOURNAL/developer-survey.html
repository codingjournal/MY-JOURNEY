<!DOCTYPE html>
<html>

        <title>Answer 105</title>

    <body>
        <h1>Developer Survey</h1>
        <hr>
        <form>
            <label>Name</label><input type="text"><br><br>
            <label>Email</label><input type="email"><br><br>
            <label>Experience (Years)</label><input type="number"><br><br>
            <label>Preferred Role</label>
            <input type="radio" name="preferred_role">Frontend
            <input type="radio" name="preferred_role">Backend
            <input type="radio" name="preferred_role">Full Stack
            <br><br>
            <label>Technologies Known</label>
            <input type="checkbox">HTML
            <input type="checkbox">CSS
            <input type="checkbox">Javascript
            <br><br>
            <label>Country</label>
            <select>
                <option>China</option>
                <option>USA</option>
                <option>Canada</option>
                <option>Germany</option>
                <option>France</option>
                <option>India</option>
            </select>
            <br><br>
            <label>Why do you want to become a Developer?</label><br>
            <textarea></textarea><br><br>
            <button>Submit</button>
         </form>
    </body>
</html>
